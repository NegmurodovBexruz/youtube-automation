version: "3.9"

services:
  db:
    image: postgres:16
    container_name: youtube_automation_db
    environment:
      POSTGRES_DB: youtube_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d youtube_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: youtube_automation_app
    shm_size: '2gb'
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/youtube_db
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/youtube_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./output:/app/output
      - ./static:/app/static
    restart: unless-stopped

volumes:
  postgres_data: